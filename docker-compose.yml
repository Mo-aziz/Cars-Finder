version: '3.8'

services:
  sqlserver:
    image: rapidfort/microsoft-sql-server-2019-ib:latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Password123
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data

volumes:
  sqlserver_data:
